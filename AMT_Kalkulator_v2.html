<!DOCTYPE html>
<html lang="pl" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMT Systems — Kalkulator projektów v2</title>
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f9f8f5;
  --border: #e2e0d8;
  --border2: #d0cec4;
  --text: #1a1a18;
  --text2: #5a5a52;
  --text3: #9a9a8e;
  --accent: #1e4d8c;
  --accent-light: #e8eef8;
  --green: #1a6b3a;
  --green-light: #e6f4eb;
  --amber: #8a5a00;
  --amber-light: #fdf3e0;
  --red: #8a1a1a;
  --red-light: #fde8e8;
  --orange: #8a4200;
  --orange-light: #fdf0e0;
  --radius: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.top-bar { background: var(--accent); color: white; padding: 0 20px; height: 44px; display: flex; align-items: center; justify-content: space-between; }
.top-bar-title { font-size: 14px; font-weight: 600; letter-spacing: .3px; }
.top-bar-sub { font-size: 11px; opacity: .65; }
.top-bar-right { display: flex; align-items: center; gap: 10px; font-size: 12px; opacity: .8; }

/* LAYOUT */
.layout { display: grid; grid-template-columns: 420px 1fr; min-height: calc(100vh - 44px); }

/* LEWA KOLUMNA — FORMULARZ */
.form-col { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; }
.form-section { padding: 16px 20px; border-bottom: 1px solid var(--border); }
.form-section:last-child { border-bottom: none; }
.section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text3); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* POLA */
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 3px; }
.field input, .field select, .field textarea {
  width: 100%; border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 7px 10px; font-size: 13px; font-family: inherit; color: var(--text);
  background: var(--surface); transition: border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.field-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* TOGGLE */
.toggle-group { display: flex; gap: 4px; }
.toggle-btn { flex: 1; padding: 6px 8px; border: 1px solid var(--border2); border-radius: var(--radius); background: var(--surface2); color: var(--text2); font-size: 12px; font-family: inherit; cursor: pointer; text-align: center; transition: all .15s; }
.toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
.toggle-btn.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }

/* CHECKBOX ITEMS */
.check-group { display: flex; flex-wrap: wrap; gap: 6px; }
.check-item { display: flex; align-items: center; gap: 5px; padding: 4px 8px; border: 1px solid var(--border2); border-radius: 12px; cursor: pointer; font-size: 12px; color: var(--text2); transition: all .15s; user-select: none; }
.check-item:hover { border-color: var(--accent); color: var(--accent); }
.check-item.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 600; }
.check-item input { display: none; }

/* PRAWA KOLUMNA — WYNIKI */
.result-col { padding: 20px; overflow-y: auto; }
.result-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 400px; color: var(--text3); text-align: center; }
.result-placeholder-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }

/* KARTY WYNIKÓW */
.result-cards { display: flex; flex-direction: column; gap: 14px; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
.card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text2); }
.card-body { padding: 14px 16px; }

/* WARIANTY CENOWE */
.price-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.price-box { border-radius: var(--radius); padding: 12px; text-align: center; border: 1.5px solid; }
.price-box-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; }
.price-box-value { font-size: 22px; font-weight: 700; margin-bottom: 2px; font-variant-numeric: tabular-nums; }
.price-box-sub { font-size: 10px; opacity: .7; }
.price-min { background: var(--amber-light); border-color: #e8c060; color: var(--amber); }
.price-target { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.price-premium { background: #f0eaf8; border-color: #8b5cf6; color: #5b21b6; }

/* MARŻA BADGE */
.marza-badge { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.marza-ok { background: var(--green-light); color: var(--green); }
.marza-warn { background: var(--amber-light); color: var(--amber); }
.marza-bad { background: var(--red-light); color: var(--red); }

/* TABELA KOSZTÓW */
.cost-table { width: 100%; border-collapse: collapse; }
.cost-table th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); text-align: left; padding: 4px 8px; border-bottom: 1px solid var(--border); }
.cost-table th:last-child, .cost-table td:last-child { text-align: right; }
.cost-table td { padding: 5px 8px; font-size: 12px; border-bottom: 1px solid var(--border); }
.cost-table tr:last-child td { border-bottom: none; }
.cost-table .cat-row td { font-weight: 700; font-size: 11px; color: var(--text2); background: var(--surface2); text-transform: uppercase; letter-spacing: .3px; padding: 6px 8px; }
.cost-table .total-row td { font-weight: 700; font-size: 13px; border-top: 2px solid var(--border2); }
.cost-table .internal { color: var(--text3); font-size: 11px; }
.cost-zero { color: var(--text3); }

/* OSTRZEŻENIA */
.alerts { display: flex; flex-direction: column; gap: 8px; }
.alert { padding: 10px 14px; border-radius: var(--radius); border: 1px solid; display: flex; align-items: flex-start; gap: 8px; font-size: 12px; }
.alert-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.alert-red { background: var(--red-light); border-color: #e8a0a0; color: var(--red); }
.alert-amber { background: var(--amber-light); border-color: #e8c060; color: var(--amber); }
.alert-orange { background: var(--orange-light); border-color: #e8a060; color: var(--orange); }
.alert-blue { background: var(--accent-light); border-color: #a0b8e8; color: var(--accent); }

/* BADGE */
.badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
.badge-small { background: var(--green-light); color: var(--green); }
.badge-medium { background: var(--amber-light); color: var(--amber); }
.badge-large { background: var(--red-light); color: var(--red); }
.badge-approx { background: #f0eaf8; color: #5b21b6; }

/* PODZIAŁ ROBOCIZNY */
.role-bars { display: flex; flex-direction: column; gap: 8px; }
.role-bar { display: grid; grid-template-columns: 160px 1fr 80px; align-items: center; gap: 8px; }
.role-bar-label { font-size: 12px; font-weight: 600; }
.role-bar-sub { font-size: 11px; color: var(--text3); }
.role-bar-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.role-bar-fill { height: 100%; border-radius: 4px; transition: width .3s; }
.bar-gt { background: var(--accent); }
.bar-daniel { background: #1a6b3a; }
.role-bar-value { font-size: 12px; font-weight: 700; text-align: right; }

/* PRZYCISK */
.btn-calc { width: 100%; padding: 11px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .15s; letter-spacing: .3px; }
.btn-calc:hover { background: #163d70; }
.btn-reset { padding: 7px 14px; background: transparent; color: var(--text2); border: 1px solid var(--border2); border-radius: var(--radius); font-size: 12px; cursor: pointer; font-family: inherit; }
.btn-reset:hover { border-color: var(--red); color: var(--red); }

/* DOJAZDY SUBFORM */
.dojazd-form { background: var(--surface2); border-radius: var(--radius); border: 1px solid var(--border); padding: 10px 12px; margin-top: 6px; }
.dojazd-form .field { margin-bottom: 6px; }
.dojazd-form .field:last-child { margin-bottom: 0; }

/* UZGODNIENIA SUBFORM */
.uzgod-form { background: var(--surface2); border-radius: var(--radius); border: 1px solid var(--border); padding: 10px 12px; margin-top: 6px; }

/* SEPARATOR */
.sep { height: 1px; background: var(--border); margin: 10px 0; }

/* INLINE ROW */
.inline-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
.inline-row span:first-child { color: var(--text2); }
.inline-row span:last-child { font-weight: 600; }

/* NOTA */
.nota { font-size: 11px; color: var(--text3); margin-top: 4px; }

@media (max-width: 800px) {
  .layout { grid-template-columns: 1fr; }
  .form-col { border-right: none; border-bottom: 1px solid var(--border); }
  .price-grid { grid-template-columns: 1fr; }
}
</style>

<body>

<div class="top-bar">
  <div>
    <span class="top-bar-title">AMT Systems — Kalkulator projektów</span>
    <span class="top-bar-sub"> &nbsp;|&nbsp; Faza 1 — deterministyczny</span>
  </div>
  <div class="top-bar-right">
    <span id="topStatus">Wypełnij formularz i kliknij Oblicz</span>
  </div>
</div>

<div class="layout">

<!-- ════ LEWA KOLUMNA ════ -->
<div class="form-col">

  <!-- TYP PROJEKTU -->
  <div class="form-section">
    <div class="section-label">Typ projektu</div>
    <div class="field">
      <label>Rodzaj projektu *</label>
      <select id="typProjektu" onchange="onTypChange()">
        <option value="">— wybierz —</option>
        <option value="przylacze_wodkan">Przyłącze wod-kan (dom jednorodzinny)</option>
        <option value="przylacze_wodkan_bud">Przyłącze wod-kan (budynek wielorodzinny)</option>
        <option value="siec_wodkan_200">Sieć wod-kan (do 200m)</option>
        <option value="siec_wodkan_500">Sieć wod-kan (200–500m)</option>
        <option value="siec_wodkan_duz">Sieć wod-kan (powyżej 500m)</option>
        <option value="przylacze_gaz">Przyłącze gazowe (niskie ciśnienie)</option>
        <option value="instalacja_gaz">Instalacja gazowa wewnętrzna</option>
        <option value="odwodnienie">Odwodnienie terenu / retencja</option>
        <option value="siec_cieplna">Sieć cieplna</option>
        <option value="wezel_cieplny">Węzeł cieplny</option>
        <option value="kolizja">Kolizja przy drodze / torowisku</option>
        <option value="pfu">PFU — Program Funkcjonalno-Użytkowy</option>
        <option value="nadzor">Nadzór autorski</option>
      </select>
    </div>
    <div class="field">
      <label>Złożoność projektu</label>
      <div class="toggle-group">
        <button class="toggle-btn active" onclick="setToggle('zlozonosc', 'prosta', this)">Prosta</button>
        <button class="toggle-btn" onclick="setToggle('zlozonosc', 'standard', this)">Standard</button>
        <button class="toggle-btn" onclick="setToggle('zlozonosc', 'zlozony', this)">Złożona</button>
      </div>
    </div>
  </div>

  <!-- LOKALIZACJA -->
  <div class="form-section">
    <div class="section-label">Lokalizacja</div>
    <div class="field">
      <label>Miejscowość</label>
      <input type="text" id="miejscowosc" placeholder="np. Katowice, ul. Testowa">
    </div>
    <div class="field">
      <label>Strefa odległości *</label>
      <div class="toggle-group">
        <button class="toggle-btn active" onclick="setToggle('strefa', 'lokalna', this)">Lokalna<br><span style="font-size:10px;font-weight:400">do 50km</span></button>
        <button class="toggle-btn" onclick="setToggle('strefa', 'regionalna', this)">Regionalna<br><span style="font-size:10px;font-weight:400">50–200km</span></button>
        <button class="toggle-btn" onclick="setToggle('strefa', 'daleka', this)">Daleka<br><span style="font-size:10px;font-weight:400">200km+</span></button>
      </div>
    </div>
    <div id="dojazdForm" class="dojazd-form" style="display:none">
      <div class="field-row">
        <div class="field">
          <label>Odległość (km w jedną stronę)</label>
          <input type="number" id="km" min="0" value="0" placeholder="km">
        </div>
        <div class="field">
          <label>Liczba wizyt</label>
          <input type="number" id="wizyty" min="0" value="1" placeholder="1">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Kto jedzie?</label>
          <select id="ktoJedzie">
            <option value="gt">GT (250 zł/h)</option>
            <option value="daniel">Daniel (140 zł/h)</option>
          </select>
        </div>
        <div class="field">
          <label>Czas dojazdu (h, w jedną stronę)</label>
          <input type="number" id="czasDojazdu" min="0" step="0.5" value="1" placeholder="h">
        </div>
      </div>
    </div>
  </div>

  <!-- DANE TECHNICZNE -->
  <div class="form-section">
    <div class="section-label">Dane techniczne</div>
    <div class="field-row">
      <div class="field">
        <label>Długość sieci / przyłącza (m)</label>
        <input type="number" id="dlugoscSieci" min="0" value="0" placeholder="0">
      </div>
      <div class="field">
        <label>Liczba obiektów / działek</label>
        <input type="number" id="liczbaObiektow" min="1" value="1" placeholder="1">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Liczba gestorów sieci</label>
        <input type="number" id="liczbaGestorow" min="1" max="10" value="1" placeholder="1">
      </div>
      <div class="field">
        <label>Pas drogowy?</label>
        <div class="toggle-group">
          <button class="toggle-btn active" onclick="setToggle('pasDrogowy', 'nie', this)">Nie</button>
          <button class="toggle-btn" onclick="setToggle('pasDrogowy', 'tak', this)">Tak</button>
        </div>
      </div>
    </div>
  </div>

  <!-- WARUNKI STARTOWE -->
  <div class="form-section">
    <div class="section-label">Warunki startowe</div>
    <div class="field-row">
      <div class="field">
        <label>Warunki techniczne?</label>
        <div class="toggle-group">
          <button class="toggle-btn" onclick="setToggle('warunki', 'brak', this)">Brak</button>
          <button class="toggle-btn active" onclick="setToggle('warunki', 'sa', this)">Są</button>
        </div>
      </div>
      <div class="field">
        <label>Mapa</label>
        <select id="mapa">
          <option value="brak">Brak — do zakupu</option>
          <option value="zasadnicza">Zasadnicza — jest</option>
          <option value="projektowa">Do celów proj. — jest</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Strefa górnicza?</label>
        <div class="toggle-group">
          <button class="toggle-btn active" onclick="setToggle('strefaGorn', 'nie', this)">Nie</button>
          <button class="toggle-btn" onclick="setToggle('strefaGorn', 'tak', this)">Tak</button>
        </div>
      </div>
      <div class="field">
        <label>Typ obiektu</label>
        <select id="typObiektu">
          <option value="dj">Dom jednorodzinny</option>
          <option value="wielorodzinny">Budynek wielorodzinny</option>
          <option value="deweloper">Deweloperski</option>
          <option value="uslugowy">Usługowy / komercyjny</option>
          <option value="droga">Droga / torowisko</option>
          <option value="inne">Inne</option>
        </select>
      </div>
    </div>
  </div>

  <!-- KOSZTY ZEWNĘTRZNE -->
  <div class="form-section">
    <div class="section-label">Koszty zewnętrzne i dodatkowe</div>
    <div class="field">
      <label>Uzgodnienia branżowe</label>
      <div class="toggle-group" style="margin-bottom:6px">
        <button class="toggle-btn active" onclick="setToggle('uzgod', 'nie', this); document.getElementById('uzgodForm').style.display='none'">Nie</button>
        <button class="toggle-btn" onclick="setToggle('uzgod', 'tak', this); document.getElementById('uzgodForm').style.display='block'">Tak</button>
      </div>
      <div id="uzgodForm" class="uzgod-form" style="display:none">
        <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px">Wybierz branże:</div>
        <div class="check-group" id="branzeGroup">
          <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="gaz">Gaz (PSG)</label>
          <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="energetyka">Energetyka</label>
          <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="teletechnika">Teletechnika</label>
          <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="cieplo">Ciepło</label>
          <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="woda">Wod-kan</label>
          <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="inne">Inne</label>
        </div>
        <div style="margin-top:8px">
          <label style="font-size:11px;font-weight:600;color:var(--text2)">Trudność uzgodnień:</label>
          <div class="toggle-group" style="margin-top:4px">
            <button class="toggle-btn active" onclick="setToggle('trudnoscUzgod', 'prosta', this)">Proste</button>
            <button class="toggle-btn" onclick="setToggle('trudnoscUzgod', 'srednia', this)">Średnie</button>
            <button class="toggle-btn" onclick="setToggle('trudnoscUzgod', 'trudna', this)">Trudne</button>
          </div>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Opcje dodatkowe</label>
      <div class="check-group">
        <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="operat">Operat wodnoprawny</label>
        <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="geologia">Geologia</label>
        <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="kosztorys">Kosztorysant</label>
        <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="por">Projekt org. ruchu (POR)</label>
        <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="nadzor_aut">Nadzór autorski</label>
        <label class="check-item" onclick="toggleCheck(this)"><input type="checkbox" value="kolizja_inf">Kolizje infrastrukturalne</label>
      </div>
    </div>
  </div>

  <!-- CENA I MARŻA -->
  <div class="form-section">
    <div class="section-label">Cena i marża</div>
    <div class="field-row">
      <div class="field">
        <label>Marża docelowa (%)</label>
        <input type="number" id="marzaTarget" min="0" max="100" value="30" placeholder="30">
      </div>
      <div class="field">
        <label>Min. cena projektu (zł)</label>
        <input type="number" id="minCena" min="0" value="2000" placeholder="2000">
      </div>
    </div>
    <div class="field">
      <label>Cena ryczałtowa (zostaw 0 = licz automatycznie)</label>
      <input type="number" id="ryczalt" min="0" value="0" placeholder="0 = auto">
    </div>
  </div>

  <!-- PRZYCISKI -->
  <div class="form-section">
    <button class="btn-calc" onclick="oblicz()">⬤ Oblicz wycenę</button>
    <div style="display:flex;justify-content:flex-end;margin-top:8px">
      <button class="btn-reset" onclick="resetForm()">Wyczyść</button>
    </div>
  </div>

</div><!-- /form-col -->

<!-- ════ PRAWA KOLUMNA ════ -->
<div class="result-col">
  <div id="placeholder" class="result-placeholder">
    <div class="result-placeholder-icon">📐</div>
    <div style="font-size:14px;font-weight:600;margin-bottom:6px">Kalkulator gotowy</div>
    <div style="font-size:12px">Wypełnij formularz i kliknij "Oblicz wycenę"</div>
  </div>
  <div id="results" class="result-cards" style="display:none"></div>
</div>

</div><!-- /layout -->

<script>
// ══════════════════════════════════════════════
// DANE BAZOWE
// ══════════════════════════════════════════════
const STAWKA_GT = 250;
const STAWKA_DANIEL = 140;
const KOSZT_GT = 110;
const KOSZT_DANIEL = 65;
const STAWKA_KM = 1.2;

// Godziny bazowe per typ [daniel_min, daniel_max, gt_min, gt_max]
const GODZINY = {
  przylacze_wodkan:    [6, 8,  1, 2],
  przylacze_wodkan_bud:[10,14, 2, 3],
  siec_wodkan_200:     [16,24, 4, 6],
  siec_wodkan_500:     [24,40, 6,10],
  siec_wodkan_duz:     [40,60,10,16],
  przylacze_gaz:       [6, 10, 1, 2],
  instalacja_gaz:      [8, 16, 2, 3],
  odwodnienie:         [12,20, 3, 5],
  siec_cieplna:        [20,40, 6,10],
  wezel_cieplny:       [20,36, 6,10],
  kolizja:             [20,40, 6,12],
  pfu:                 [16,32, 8,16],
  nadzor:              [0,  0, 2, 4],
};

// Koszty administracyjne bazowe (K01-K04) per typ [min, max]
const KOSZTY_ADMIN = {
  przylacze_wodkan:    [200, 400],
  przylacze_wodkan_bud:[300, 600],
  siec_wodkan_200:     [400, 800],
  siec_wodkan_500:     [600,1200],
  siec_wodkan_duz:     [800,1600],
  przylacze_gaz:       [150, 350],
  instalacja_gaz:      [100, 300],
  odwodnienie:         [300, 700],
  siec_cieplna:        [400, 900],
  wezel_cieplny:       [300, 700],
  kolizja:             [600,1400],
  pfu:                 [200, 500],
  nadzor:              [0,   0  ],
};

// Mapa — typy
const MAPA_TYP = {
  przylacze_wodkan: 'zasadnicza', przylacze_wodkan_bud: 'zasadnicza',
  przylacze_gaz: 'zasadnicza', instalacja_gaz: 'zasadnicza', nadzor: 'brak',
  siec_wodkan_200: 'projektowa', siec_wodkan_500: 'projektowa', siec_wodkan_duz: 'projektowa',
  odwodnienie: 'projektowa', siec_cieplna: 'projektowa', wezel_cieplny: 'projektowa',
  kolizja: 'projektowa', pfu: 'projektowa',
};

const MAPA_KOSZTY = { zasadnicza: [80, 150], projektowa: [1000, 2000], brak: [0, 0] };
const MAPA_ROBOCIZNA = { zasadnicza: 1, projektowa: 2, brak: 0 }; // h Daniela

// Stan
const state = {
  zlozonosc: 'prosta', strefa: 'lokalna', pasDrogowy: 'nie',
  warunki: 'sa', strefaGorn: 'nie', uzgod: 'nie',
  trudnoscUzgod: 'prosta',
};

function setToggle(key, val, btn) {
  state[key] = val;
  const group = btn.closest('.toggle-group');
  group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (key === 'strefa') {
    document.getElementById('dojazdForm').style.display = (val !== 'lokalna') ? 'block' : 'none';
  }
}

function toggleCheck(label) {
  label.classList.toggle('active');
  label.querySelector('input').checked = label.classList.contains('active');
}

function getChecked(groupId) {
  return Array.from(document.querySelectorAll(`#${groupId} input:checked`)).map(i => i.value);
}

function onTypChange() {
  const typ = document.getElementById('typProjektu').value;
  const mapaSug = MAPA_TYP[typ] || 'zasadnicza';
  // Podpowiedz mapę jeśli nie jest ustawiona przez użytkownika
  const mapaEl = document.getElementById('mapa');
  if (mapaEl.value === 'brak' && mapaSug !== 'brak') {
    // zostaw — user może zmienić
  }
}

// ══════════════════════════════════════════════
// GŁÓWNA KALKULACJA
// ══════════════════════════════════════════════
function oblicz() {
  const typ = document.getElementById('typProjektu').value;
  if (!typ) { alert('Wybierz typ projektu'); return; }

  const zloz = state.zlozonosc;
  const strefa = state.strefa;
  const pasDrog = state.pasDrogowy === 'tak';
  const brakWT = state.warunki === 'brak';
  const strefaGorn = state.strefaGorn === 'tak';
  const uzgodBranżowe = state.uzgod === 'tak';
  const trudnoscUzgod = state.trudnoscUzgod;
  const mapa = document.getElementById('mapa').value;
  const dlugoscSieci = parseFloat(document.getElementById('dlugoscSieci').value) || 0;
  const liczbaObiektow = parseInt(document.getElementById('liczbaObiektow').value) || 1;
  const liczbaGestorow = parseInt(document.getElementById('liczbaGestorow').value) || 1;
  const typObiektu = document.getElementById('typObiektu').value;
  const marzaTarget = parseFloat(document.getElementById('marzaTarget').value) || 30;
  const minCena = parseFloat(document.getElementById('minCena').value) || 2000;
  const ryczalt = parseFloat(document.getElementById('ryczalt').value) || 0;
  const branzeSelected = getChecked('branzeGroup');
  const opcjeDodatkowe = getChecked('result-col') || [];
  const opcje = Array.from(document.querySelectorAll('.check-group .check-item.active')).map(el => el.querySelector('input').value);

  // Godziny bazowe
  const g = GODZINY[typ] || [8, 12, 2, 4];
  let danielH = (g[0] + g[1]) / 2;
  let gtH = (g[2] + g[3]) / 2;

  // Korekta złożoności
  const zlozMnoznik = { prosta: 0.85, standard: 1.0, zlozony: 1.3 }[zloz] || 1.0;
  danielH *= zlozMnoznik;
  gtH *= zlozMnoznik;

  // Korekta liczby obiektów
  if (liczbaObiektow > 1) {
    const mnoznikObj = 1 + (liczbaObiektow - 1) * 0.5;
    danielH *= mnoznikObj;
    gtH *= Math.min(mnoznikObj, 1.5);
  }

  // Korekta długości sieci
  if (dlugoscSieci > 500) { danielH *= 1.3; gtH *= 1.2; }
  else if (dlugoscSieci > 200) { danielH *= 1.15; gtH *= 1.1; }

  // Korekta deweloper
  if (typObiektu === 'deweloper') { danielH *= 1.2; gtH *= 1.15; }

  // Brak WT — dodaj czas
  let hBrakWT_GT = 0, hBrakWT_D = 0;
  if (brakWT) { hBrakWT_GT = 1.5; hBrakWT_D = 2; }

  // Strefa górnicza
  let hOUG_GT = 0, hOUG_D = 0;
  if (strefaGorn) { hOUG_GT = 2; hOUG_D = 3; }

  // Pas drogowy
  let hPasDrog_GT = 0, hPasDrog_D = 0;
  if (pasDrog) { hPasDrog_GT = 2; hPasDrog_D = 4; }

  // Uzgodnienia branżowe
  let hUzgod_GT = 0, hUzgod_D = 0;
  const mnoznikTrudnosc = { prosta: 1.0, srednia: 1.5, trudna: 2.5 }[trudnoscUzgod] || 1.0;
  if (uzgodBranżowe && branzeSelected.length > 0) {
    hUzgod_D = branzeSelected.length * 2 * mnoznikTrudnosc;
    hUzgod_GT = branzeSelected.length * 0.5 * mnoznikTrudnosc;
  }

  // Gestorzy
  if (liczbaGestorow > 1) {
    const dod = (liczbaGestorow - 1) * 1.5;
    hUzgod_D += dod;
    hUzgod_GT += dod * 0.3;
  }

  // Opcje dodatkowe — czas
  let hNadzor_GT = 0;
  if (opcje.includes('nadzor_aut')) { hNadzor_GT = 3; }
  if (opcje.includes('kolizja_inf')) { danielH += 4; gtH += 2; }

  // Finalne godziny
  const danielTotal = Math.round((danielH + hBrakWT_D + hOUG_D + hPasDrog_D + hUzgod_D) * 2) / 2;
  const gtTotal = Math.round((gtH + hBrakWT_GT + hOUG_GT + hPasDrog_GT + hUzgod_GT + hNadzor_GT) * 2) / 2;

  // ── ROBOCIZNA ──
  const robociznaSprzedaz = danielTotal * STAWKA_DANIEL + gtTotal * STAWKA_GT;
  const robociznaKoszt = danielTotal * KOSZT_DANIEL + gtTotal * KOSZT_GT;

  // ── KOSZTY ADMIN ──
  const adm = KOSZTY_ADMIN[typ] || [200, 400];
  let kosztAdmin = (adm[0] + adm[1]) / 2;
  if (brakWT) kosztAdmin += 200;
  if (strefaGorn) kosztAdmin += 300;
  if (pasDrog) kosztAdmin += 400;

  // ── MAPA ──
  const mapaSug = MAPA_TYP[typ] || 'zasadnicza';
  const mapaUzywana = mapa === 'brak' ? mapaSug : 'brak'; // zakup mapy jeśli nie ma
  let kosztMapa = 0, hMapaDaniel = 0;
  if (mapa === 'brak') {
    const mc = MAPA_KOSZTY[mapaSug];
    kosztMapa = (mc[0] + mc[1]) / 2;
    hMapaDaniel = MAPA_ROBOCIZNA[mapaSug];
  }
  const kosztMapaRobocizna = hMapaDaniel * STAWKA_DANIEL;

  // ── PAS DROGOWY — POR ──
  let kosztPOR = 0;
  if (pasDrog || opcje.includes('por')) kosztPOR = 2500;

  // ── UZGODNIENIA — koszty zewnętrzne ──
  let kosztUzgodZewn = 0;
  if (uzgodBranżowe) kosztUzgodZewn = branzeSelected.length * 150;

  // ── OPCJE DODATKOWE — koszty ──
  let kosztOperat = opcje.includes('operat') ? 3000 : 0;
  let kosztGeologia = opcje.includes('geologia') ? 4000 : 0;
  let kosztKosztorys = opcje.includes('kosztorys') ? 1500 : 0;

  // ── DOJAZDY ──
  let kosztDojazd = 0;
  let dojazdOpis = '';
  if (strefa !== 'lokalna') {
    const km = parseFloat(document.getElementById('km').value) || 0;
    const wizyty = parseInt(document.getElementById('wizyty').value) || 1;
    const ktoJedzie = document.getElementById('ktoJedzie').value;
    const czasDojazdu = parseFloat(document.getElementById('czasDojazdu').value) || 1;
    const stawkaOsoby = ktoJedzie === 'gt' ? STAWKA_GT : STAWKA_DANIEL;
    const kosztKm = km * 2 * STAWKA_KM;
    const kosztCzas = czasDojazdu * 2 * stawkaOsoby;
    kosztDojazd = (kosztKm + kosztCzas) * wizyty;
    dojazdOpis = `${km}km × 2 strony × ${wizyty} wizyt | ${(czasDojazdu*2).toFixed(1)}h × ${stawkaOsoby} zł × ${wizyty} wizyt`;
  }

  // ── SUMA KOSZTÓW ──
  const kosztZewnetrzny = kosztAdmin + kosztMapa + kosztPOR + kosztUzgodZewn + kosztOperat + kosztGeologia + kosztKosztorys;
  const kosztCalkowity = robociznaKoszt + kosztZewnetrzny + kosztDojazd;
  const kosztSprzedazowy = robociznaSprzedaz + kosztMapaRobocizna + kosztZewnetrzny + kosztDojazd;

  // ── CENA SPRZEDAŻOWA ──
  let cenaDocelowa, cenaMin, cenaPremium;
  if (ryczalt > 0) {
    cenaDocelowa = ryczalt;
    cenaMin = ryczalt * 0.9;
    cenaPremium = ryczalt * 1.2;
  } else {
    const marzaMin = 0.15, marzaDoel = marzaTarget / 100, marzaPrem = 0.40;
    cenaMin = kosztSprzedazowy / (1 - marzaMin);
    cenaDocelowa = kosztSprzedazowy / (1 - marzaDoel);
    cenaPremium = kosztSprzedazowy / (1 - marzaPrem);
    // Minimalna cena
    cenaMin = Math.max(cenaMin, minCena);
    cenaDocelowa = Math.max(cenaDocelowa, minCena);
    cenaPremium = Math.max(cenaPremium, minCena);
  }

  // Zaokrąglenie do 100
  const r100 = n => Math.round(n / 100) * 100;
  cenaMin = r100(cenaMin); cenaDocelowa = r100(cenaDocelowa); cenaPremium = r100(cenaPremium);

  // ── MARŻA REALNA (dla ceny docelowej) ──
  const marzaRealna = ((cenaDocelowa - kosztSprzedazowy) / cenaDocelowa * 100);
  const marzaRealnaKwota = cenaDocelowa - kosztSprzedazowy;

  // ── KLASYFIKACJA ──
  const totalH = danielTotal + gtTotal;
  const klasyfikacja = totalH <= 10 ? 'small' : totalH <= 40 ? 'medium' : 'large';
  const klasLabel = { small: 'MAŁY', medium: 'ŚREDNI', large: 'DUŻY' }[klasyfikacja];
  const klasClass = { small: 'badge-small', medium: 'badge-medium', large: 'badge-large' }[klasyfikacja];

  // ── OSTRZEŻENIA ──
  const alerts = [];
  if (cenaDocelowa < kosztSprzedazowy) alerts.push({ type: 'red', icon: '🚫', msg: 'PROJEKT STRATNY — cena poniżej kosztów. Zmień cenę lub ogranicz zakres.' });
  if (marzaRealna < 15 && cenaDocelowa >= kosztSprzedazowy) alerts.push({ type: 'amber', icon: '⚠️', msg: `Marża ${marzaRealna.toFixed(1)}% poniżej minimum 15%. Ryzyko projektowe.` });
  if (cenaDocelowa < minCena) alerts.push({ type: 'amber', icon: '⚠️', msg: `Cena ${fmt(cenaDocelowa)} poniżej progu minimalnego ${fmt(minCena)}.` });
  if (kosztDojazd > 0 && kosztDojazd / cenaDocelowa > 0.30) alerts.push({ type: 'orange', icon: '🚗', msg: `Koszty dojazdu (${fmt(kosztDojazd)}) stanowią ${(kosztDojazd/cenaDocelowa*100).toFixed(0)}% wartości projektu. Rozważ ograniczenie wizyt lub wyższą cenę.` });
  if (strefa === 'daleka') alerts.push({ type: 'orange', icon: '📍', msg: 'Projekt daleki (200km+) — sprawdź czy liczba wizyt jest realistyczna.' });
  const brakDanych = !document.getElementById('miejscowosc').value;
  if (brakDanych) alerts.push({ type: 'blue', icon: 'ℹ️', msg: 'Wycena przybliżona — brak lokalizacji lub danych szczegółowych.' });

  // ── RENDER ──
  const fmt = n => Math.round(n).toLocaleString('pl-PL') + ' zł';
  const fmtH = h => h.toFixed(1) + ' h';
  const marzaClass = marzaRealna >= 30 ? 'marza-ok' : marzaRealna >= 15 ? 'marza-warn' : 'marza-bad';
  const gtBarW = gtTotal / (gtTotal + danielTotal + 0.001) * 100;
  const danielBarW = danielTotal / (gtTotal + danielTotal + 0.001) * 100;

  const alertsHTML = alerts.length ? `
    <div class="card">
      <div class="card-header"><span class="card-title">Ostrzeżenia i uwagi</span></div>
      <div class="card-body">
        <div class="alerts">
          ${alerts.map(a => `<div class="alert alert-${a.type}"><span class="alert-icon">${a.icon}</span><span>${a.msg}</span></div>`).join('')}
        </div>
      </div>
    </div>` : '';

  const dojazdRow = kosztDojazd > 0 ? `
    <tr class="cat-row"><td colspan="3">Dojazdy</td></tr>
    <tr><td>Koszty dojazdu</td><td class="internal">${dojazdOpis}</td><td>${fmt(kosztDojazd)}</td></tr>` : '';

  const mapaRow = kosztMapa > 0 ? `<tr><td>Mapa (${mapaSug === 'projektowa' ? 'do celów proj.' : 'zasadnicza'})</td><td class="internal">zakup zewnętrzny</td><td>${fmt(kosztMapa)}</td></tr>` : '';
  const porRow = kosztPOR > 0 ? `<tr><td>Projekt organizacji ruchu (POR)</td><td class="internal">podwykonawca</td><td>${fmt(kosztPOR)}</td></tr>` : '';
  const uzgodRow = kosztUzgodZewn > 0 ? `<tr><td>Uzgodnienia branżowe — opłaty</td><td class="internal">${branzeSelected.join(', ')}</td><td>${fmt(kosztUzgodZewn)}</td></tr>` : '';
  const operatRow = kosztOperat > 0 ? `<tr><td>Operat wodnoprawny</td><td class="internal">zewnętrzny</td><td>${fmt(kosztOperat)}</td></tr>` : '';
  const geologiaRow = kosztGeologia > 0 ? `<tr><td>Badania geologiczne</td><td class="internal">zewnętrzny</td><td>${fmt(kosztGeologia)}</td></tr>` : '';
  const kosztorysRow = kosztKosztorys > 0 ? `<tr><td>Kosztorysant</td><td class="internal">zewnętrzny</td><td>${fmt(kosztKosztorys)}</td></tr>` : '';

  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('results').style.display = 'flex';
  document.getElementById('topStatus').textContent = `${typ.replace(/_/g,' ')} | ${fmt(cenaDocelowa)}`;

  document.getElementById('results').innerHTML = `

    ${alertsHTML}

    <!-- CENY -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Warianty cenowe</span>
        <span class="badge ${klasClass}">${klasLabel} — ${fmtH(totalH)}</span>
      </div>
      <div class="card-body">
        <div class="price-grid">
          <div class="price-box price-min">
            <div class="price-box-label">Minimalny</div>
            <div class="price-box-value">${fmt(cenaMin)}</div>
            <div class="price-box-sub">marża 15%</div>
          </div>
          <div class="price-box price-target">
            <div class="price-box-label">⭐ Docelowy</div>
            <div class="price-box-value">${fmt(cenaDocelowa)}</div>
            <div class="price-box-sub">marża ${marzaTarget}%</div>
          </div>
          <div class="price-box price-premium">
            <div class="price-box-label">Premium</div>
            <div class="price-box-value">${fmt(cenaPremium)}</div>
            <div class="price-box-sub">marża 40%</div>
          </div>
        </div>
        <div class="sep"></div>
        <div class="inline-row">
          <span>Koszt sprzedażowy (baza kalkulacji)</span>
          <span>${fmt(kosztSprzedazowy)}</span>
        </div>
        <div class="inline-row">
          <span>Marża realna (cena docelowa)</span>
          <span class="marza-badge ${marzaClass}">${marzaRealna.toFixed(1)}% | ${fmt(marzaRealnaKwota)}</span>
        </div>
        ${ryczalt > 0 ? `<div class="nota">⚠ Cena ryczałtowa ustawiona ręcznie: ${fmt(ryczalt)}</div>` : ''}
      </div>
    </div>

    <!-- PODZIAŁ RÓL -->
    <div class="card">
      <div class="card-header"><span class="card-title">Robocizna — podział ról</span></div>
      <div class="card-body">
        <div class="role-bars">
          <div class="role-bar">
            <div>
              <div class="role-bar-label">GT (Grzegorz)</div>
              <div class="role-bar-sub">${fmtH(gtTotal)} × ${STAWKA_GT} zł = ${fmt(gtTotal*STAWKA_GT)}</div>
            </div>
            <div class="role-bar-track"><div class="role-bar-fill bar-gt" style="width:${gtBarW}%"></div></div>
            <div class="role-bar-value">${fmtH(gtTotal)}</div>
          </div>
          <div class="role-bar">
            <div>
              <div class="role-bar-label">Daniel</div>
              <div class="role-bar-sub">${fmtH(danielTotal)} × ${STAWKA_DANIEL} zł = ${fmt(danielTotal*STAWKA_DANIEL)}</div>
            </div>
            <div class="role-bar-track"><div class="role-bar-fill bar-daniel" style="width:${danielBarW}%"></div></div>
            <div class="role-bar-value">${fmtH(danielTotal)}</div>
          </div>
        </div>
        <div class="sep"></div>
        <div class="inline-row">
          <span>Łączna robocizna (cena sprzedażowa)</span>
          <span>${fmt(robociznaSprzedaz)}</span>
        </div>
        <div class="inline-row">
          <span>Koszt wewnętrzny robocizny</span>
          <span style="color:var(--text3)">${fmt(robociznaKoszt)}</span>
        </div>
      </div>
    </div>

    <!-- ARKUSZ KOSZTÓW -->
    <div class="card">
      <div class="card-header"><span class="card-title">Arkusz kosztów — wewnętrzny</span></div>
      <div class="card-body" style="padding:0">
        <table class="cost-table">
          <thead>
            <tr><th>Pozycja</th><th>Uwagi</th><th>Kwota</th></tr>
          </thead>
          <tbody>
            <tr class="cat-row"><td colspan="3">Robocizna (sprzedażowa)</td></tr>
            <tr><td>GT — ${fmtH(gtTotal)}</td><td class="internal">× ${STAWKA_GT} zł/h</td><td>${fmt(gtTotal*STAWKA_GT)}</td></tr>
            <tr><td>Daniel — ${fmtH(danielTotal)}</td><td class="internal">× ${STAWKA_DANIEL} zł/h</td><td>${fmt(danielTotal*STAWKA_DANIEL)}</td></tr>
            ${hMapaDaniel > 0 ? `<tr><td>Daniel — mapa ${fmtH(hMapaDaniel)}</td><td class="internal">obsługa mapy</td><td>${fmt(hMapaDaniel*STAWKA_DANIEL)}</td></tr>` : ''}

            <tr class="cat-row"><td colspan="3">Koszty administracyjne</td></tr>
            <tr><td>Opłaty skarbowe, wypisy, ZUD</td><td class="internal">K01–K04</td><td>${fmt(kosztAdmin)}</td></tr>

            <tr class="cat-row"><td colspan="3">Koszty zewnętrzne</td></tr>
            ${mapaRow}
            ${porRow}
            ${uzgodRow}
            ${operatRow}
            ${geologiaRow}
            ${kosztorysRow}
            ${dojazdRow}

            <tr class="total-row">
              <td colspan="2">ŁĄCZNY KOSZT PROJEKTU (wewnętrzny)</td>
              <td>${fmt(kosztCalkowity)}</td>
            </tr>
            <tr class="total-row">
              <td colspan="2">BAZA KALKULACJI (sprzedażowa)</td>
              <td>${fmt(kosztSprzedazowy)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- REGUŁY KTÓRE ZADZIAŁAŁY -->
    <div class="card">
      <div class="card-header"><span class="card-title">Zastosowane reguły automatyczne</span></div>
      <div class="card-body">
        <div style="display:flex;flex-wrap:wrap;gap:6px;font-size:11px">
          ${pasDrog ? '<span class="check-item active" style="cursor:default">R01 Pas drogowy → POR + robocizna</span>' : ''}
          ${uzgodBranżowe && branzeSelected.length > 0 ? `<span class="check-item active" style="cursor:default">R02 Uzgodnienia (${branzeSelected.join(', ')})</span>` : ''}
          ${mapa === 'brak' ? `<span class="check-item active" style="cursor:default">R03/R04 Mapa ${mapaSug} — do zakupu</span>` : ''}
          ${dlugoscSieci > 200 ? '<span class="check-item active" style="cursor:default">R05 Sieć >200m → korekta robocizny</span>' : ''}
          ${strefaGorn ? '<span class="check-item active" style="cursor:default">R06 Strefa górnicza → OUG</span>' : ''}
          ${brakWT ? '<span class="check-item active" style="cursor:default">R08 Brak WT → czas na uzyskanie</span>' : ''}
          ${liczbaGestorow > 1 ? `<span class="check-item active" style="cursor:default">R09 ${liczbaGestorow} gestorów → skalowanie uzgodnień</span>` : ''}
          ${strefa !== 'lokalna' ? `<span class="check-item active" style="cursor:default">R10 Strefa ${strefa} → koszty dojazdu</span>` : ''}
          ${typObiektu === 'deweloper' ? '<span class="check-item active" style="cursor:default">R12 Deweloper → iteracje +20%</span>' : ''}
          ${klasyfikacja === 'small' ? '<span class="check-item active" style="cursor:default">R13 Mały projekt → GT tylko nadzór</span>' : ''}
        </div>
      </div>
    </div>

  `;
}

function resetForm() {
  document.getElementById('typProjektu').value = '';
  document.getElementById('miejscowosc').value = '';
  document.getElementById('dlugoscSieci').value = '0';
  document.getElementById('liczbaObiektow').value = '1';
  document.getElementById('liczbaGestorow').value = '1';
  document.getElementById('mapa').value = 'brak';
  document.getElementById('ryczalt').value = '0';
  document.getElementById('marzaTarget').value = '30';
  document.getElementById('minCena').value = '2000';
  document.getElementById('km').value = '0';
  document.getElementById('wizyty').value = '1';
  document.getElementById('czasDojazdu').value = '1';
  document.querySelectorAll('.check-item').forEach(el => { el.classList.remove('active'); el.querySelector('input').checked = false; });
  document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.toggle-group').forEach(grp => { const first = grp.querySelector('.toggle-btn'); if (first) first.classList.add('active'); });
  Object.assign(state, { zlozonosc:'prosta', strefa:'lokalna', pasDrogowy:'nie', warunki:'sa', strefaGorn:'nie', uzgod:'nie', trudnoscUzgod:'prosta' });
  document.getElementById('dojazdForm').style.display = 'none';
  document.getElementById('uzgodForm').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('results').style.display = 'none';
  document.getElementById('topStatus').textContent = 'Wypełnij formularz i kliknij Oblicz';
}
</script>
